<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Furniture</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f8f8f8;
}
header {
  background: #111;
  color: #fff;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  letter-spacing: 2px;
}
.hero {
  height: 60vh;
  background: url('hero.jpg') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 40px;
  font-weight: 600;
}
.container {
  padding: 40px;
}
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}
.product {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  transition: 0.3s;
}
.product:hover {
  transform: translateY(-10px);
}
.product img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}
.product-content {
  padding: 15px;
}
.product h3 {
  margin: 0;
}
.product p {
  font-size: 14px;
  color: #555;
}
.price {
  font-weight: bold;
  margin: 10px 0;
}
.btn {
  display: block;
  text-align: center;
  padding: 10px;
  background: #111;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}
footer {
  text-align: center;
  padding: 20px;
  background: #111;
  color: white;
}
</style>
</head>
<body>

<header>PREMIUM FURNITURE</header>

<div class="hero">Luxury & Comfort</div>

<div class="container">
  <div class="products">

    <div class="product">
      <img src="sofa.jpg">
      <div class="product-content">
        <h3>Luxury Sofa</h3>
        <p>High-quality leather sofa for modern homes.</p>
        <div class="price">$800</div>
        <a class="btn" href="tel:+998901234567">Call to Order</a>
      </div>
    </div>

    <div class="product">
      <img src="chair.jpg">
      <div class="product-content">
        <h3>Modern Chair</h3>
        <p>Elegant and comfortable wooden chair.</p>
        <div class="price">$150</div>
        <a class="btn" href="tel:+998901234567">Call to Order</a>
      </div>
    </div>

    <div class="product">
      <img src="table.jpg">
      <div class="product-content">
        <h3>Dining Table</h3>
        <p>Perfect table for family gatherings.</p>
        <div class="price">$500</div>
        <a class="btn" href="tel:+998901234567">Call to Order</a>
      </div>
    </div>

  </div>
</div>

<footer>Contact us: +998 90 123 45 67</footer>

</body>
</html>
